<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description"
        content="Upload PDFs or images and get actionable suggestions to improve your content's engagement, readability, and clarity." />
    <title>Content Analyzer — Make Your Content More Engaging</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="/style.css" />
</head>

<body>
    <div class="app">
        <!-- Header -->
        <header class="header">
            <span class="header__icon">📄</span>
            <h1 class="header__title">Content Analyzer</h1>
            <p class="header__subtitle">Upload a PDF or image — get concrete suggestions to boost engagement</p>
        </header>

        <!-- Upload Zone -->
        <div class="upload-zone" id="uploadZone">
            <input type="file" class="upload-zone__input" id="fileInput" accept=".pdf,.png,.jpg,.jpeg" />
            <span class="upload-zone__icon">📤</span>
            <p class="upload-zone__text">
                Drag & drop your file here, or <strong>click to browse</strong>
            </p>
            <p class="upload-zone__hint">PDF, PNG, or JPG — up to 10 MB</p>
        </div>

        <!-- File Info -->
        <div class="file-info" id="fileInfo">
            <span class="file-info__icon" id="fileIcon">📄</span>
            <span class="file-info__name" id="fileName"></span>
            <span class="file-info__size" id="fileSize"></span>
            <button class="file-info__remove" id="removeFile" title="Remove file">✕</button>
        </div>

        <!-- Analyze Button -->
        <button class="analyze-btn" id="analyzeBtn">
            <span class="analyze-btn__spinner"></span>
            <span class="analyze-btn__text">Analyze Content</span>
        </button>

        <!-- Error -->
        <div class="error" id="errorBox"></div>

        <!-- Results -->
        <section class="results" id="results">
            <!-- Overall Score -->
            <div class="score-hero" id="scoreHero">
                <div class="score-hero__ring">
                    <svg viewBox="0 0 160 160">
                        <circle class="score-hero__ring-bg" cx="80" cy="80" r="70" />
                        <circle class="score-hero__ring-progress" id="scoreRing" cx="80" cy="80" r="70"
                            stroke-dasharray="439.82" stroke-dashoffset="439.82" />
                    </svg>
                    <span class="score-hero__value" id="scoreValue">0</span>
                </div>
                <p class="score-hero__label">Overall Engagement Score</p>
                <div class="score-hero__meta">
                    <span>📝 <span id="wordCount">0</span> words</span>
                    <span>📏 <span id="sentenceCount">0</span> sentences</span>
                    <span>📁 <span id="resultFilename"></span></span>
                </div>
            </div>

            <!-- Extraction Metadata -->
            <div class="extraction-meta" id="extractionMeta"></div>

            <!-- Dimension Cards -->
            <div class="dimensions" id="dimensions"></div>

            <!-- Suggestions -->
            <div class="suggestions" id="suggestions">
                <h2 class="suggestions__title">💡 Suggestions</h2>
                <div id="suggestionList"></div>
            </div>
        </section>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
